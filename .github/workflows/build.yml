name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate stamps
        run: python generate_stamps.py
        env:
          PYTHONUTF8: "1"

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "TitanCleaner" --add-data "assets\stamps;assets\stamps" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TitanCleaner-Windows
          path: dist/TitanCleaner.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TitanCleaner.exe
          generate_release_notes: true
