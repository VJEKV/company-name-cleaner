name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate stamps
        run: python generate_stamps.py
        env:
          PYTHONUTF8: "1"

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "TitanCleaner" --add-data "assets\stamps;assets\stamps" main.py

      - name: Install Tesseract via choco
        run: choco install tesseract --no-progress -y

      - name: Bundle portable Tesseract
        shell: pwsh
        run: |
          $src = "C:\Program Files\Tesseract-OCR"
          $dst = "dist\TitanCleaner\tesseract"
          New-Item -ItemType Directory -Path "$dst\tessdata" -Force
          # Бинарники
          Copy-Item "$src\tesseract.exe" "$dst\"
          Copy-Item "$src\*.dll" "$dst\"
          # Языковые данные (eng идёт с choco)
          Copy-Item "$src\tessdata\eng.traineddata" "$dst\tessdata\"
          Copy-Item "$src\tessdata\osd.traineddata" "$dst\tessdata\"
          # Скачиваем русский язык отдельно
          $rusUrl = "https://github.com/tesseract-ocr/tessdata/raw/main/rus.traineddata"
          Invoke-WebRequest -Uri $rusUrl -OutFile "$dst\tessdata\rus.traineddata"
          # Проверка
          Get-ChildItem -Recurse "$dst" | Format-Table Name, Length

      - name: Package portable ZIP
        shell: pwsh
        run: |
          # Move EXE into folder
          New-Item -ItemType Directory -Path dist\TitanCleaner -Force
          Move-Item dist\TitanCleaner.exe dist\TitanCleaner\ -Force
          # Create ZIP
          Compress-Archive -Path dist\TitanCleaner -DestinationPath dist\TitanCleaner-Portable.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TitanCleaner-Portable
          path: dist/TitanCleaner-Portable.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TitanCleaner-Portable.zip
          generate_release_notes: true
